<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand2Emoji</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0e0f14;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.07);
      --accent:  #a78bfa;
      --green:   #34d399;
      --amber:   #fbbf24;
      --red:     #f87171;
      --text:    #e2e8f0;
      --muted:   #475569;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Outfit', sans-serif; overflow: hidden;
    }

    /* FONDO */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(167,139,250,.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 90%, rgba(52,211,153,.07) 0%, transparent 60%);
    }

    /* LAYOUT */
    .app {
      position: relative; z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 1rem 1.25rem;
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-size: 1.2rem; font-weight: 700; letter-spacing: -.02em;
      display: flex; align-items: center; gap: .5rem;
    }
    .logo-em {
      background: linear-gradient(90deg, var(--accent), #f9a8d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .api-pill {
      display: flex; align-items: center; gap: .4rem;
      padding: .35rem .85rem; border-radius: 999px;
      font-family: 'JetBrains Mono', monospace; font-size: .65rem;
      transition: all .3s;
    }
    .api-pill.online  { background: rgba(52,211,153,.08);  border: 1px solid rgba(52,211,153,.2);  color: var(--green); }
    .api-pill.offline { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); color: var(--red); }
    .api-pill.loading { background: rgba(251,191,36,.08);  border: 1px solid rgba(251,191,36,.2);  color: var(--amber); }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .api-pill.online .dot { animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* CENTRO — video + emoji */
    .center {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1rem;
      min-height: 0;
    }

    /* VIDEO */
    .video-wrap {
      position: relative;
      border-radius: 1.25rem;
      overflow: hidden;
      background: #0a0b0f;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #video, #canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #video  { transform: scaleX(-1); }
    #canvas { z-index: 2; }

    /* Gradientes sobre video */
    .vg-top { position:absolute; top:0; left:0; right:0; height:30%; background:linear-gradient(to bottom,rgba(14,15,20,.8),transparent); z-index:3; pointer-events:none; }
    .vg-bot { position:absolute; bottom:0; left:0; right:0; height:40%; background:linear-gradient(to top,rgba(14,15,20,.95),transparent); z-index:3; pointer-events:none; }

    /* Emoji sobre video */
    .video-emoji {
      position: absolute; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      z-index: 5; text-align: center; pointer-events: none;
    }
    .video-emoji .glyph {
      font-size: 5.5rem; line-height: 1; display: block;
      filter: drop-shadow(0 0 24px rgba(167,139,250,.5));
    }
    .video-emoji .glyph.pop { animation: pop .25s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { 0%{transform:scale(.6)} 100%{transform:scale(1)} }
    .video-emoji .name {
      margin-top: .3rem; font-size: .7rem; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      color: rgba(255,255,255,.45);
    }

    /* Badges video */
    .vbadge {
      position: absolute; z-index: 5;
      font-family: 'JetBrains Mono', monospace; font-size: .6rem;
      padding: .25rem .6rem; border-radius: .4rem;
      background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
      border: 1px solid var(--border); color: var(--muted);
    }
    .vbadge.tl { top: .75rem; left: .75rem; }
    .vbadge.tr { top: .75rem; right: .75rem; color: var(--green); border-color: rgba(52,211,153,.2); }

    /* Barra hold/cooldown */
    .progress-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; z-index: 6; background: rgba(255,255,255,.05);
    }
    .progress-fill {
      height: 100%; width: 0%; border-radius: 999px;
      transition: background .3s;
    }

    /* Overlay inicio */
    .start-overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: rgba(14,15,20,.9); backdrop-filter: blur(6px);
    }
    .start-overlay .float { font-size: 4.5rem; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .start-overlay p { color: var(--muted); font-size: .85rem; }

    /* PANEL DERECHO */
    .panel {
      display: flex; flex-direction: column; gap: .75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem;
      backdrop-filter: blur(12px);
    }
    .card-title {
      font-size: .6rem; font-weight: 600; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted);
      font-family: 'JetBrains Mono', monospace; margin-bottom: .75rem;
    }

    /* Gesto actual */
    .curr {
      display: flex; align-items: center; gap: .75rem;
    }
    .curr-box {
      width: 56px; height: 56px; border-radius: .75rem; flex-shrink: 0;
      background: rgba(167,139,250,.06); border: 1px solid rgba(167,139,250,.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; transition: all .2s;
    }
    .curr-box.active {
      background: rgba(167,139,250,.12); border-color: rgba(167,139,250,.35);
      box-shadow: 0 0 16px rgba(167,139,250,.15);
    }
    .curr-name { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
    .curr-name.empty { color: var(--muted); font-weight: 400; font-size: .9rem; }

    /* Chips */
    .chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .35rem;
    }
    .chip {
      aspect-ratio: 1; border-radius: .6rem;
      background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.05);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: .1rem; transition: all .2s; padding: .25rem;
      cursor: default;
    }
    .chip.active {
      background: rgba(167,139,250,.1); border-color: rgba(167,139,250,.3);
      transform: scale(1.06); box-shadow: 0 0 12px rgba(167,139,250,.12);
    }
    .chip-em { font-size: 1.1rem; }
    .chip-nm {
      font-size: .32rem; font-family: 'JetBrains Mono', monospace;
      color: var(--muted); text-align: center; line-height: 1.2;
    }
    .chip.active .chip-nm { color: var(--accent); }

    /* Botón */
    .btn {
      width: 100%; padding: .8rem; border-radius: .75rem; border: none;
      font-family: 'Outfit', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; box-shadow: 0 4px 16px rgba(167,139,250,.2);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(167,139,250,.3); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-danger {
      background: rgba(248,113,113,.06); color: var(--red);
      border: 1px solid rgba(248,113,113,.18);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,.12); }
    .btn-danger:disabled { opacity: .3; cursor: not-allowed; }

    .btns { display: flex; flex-direction: column; gap: .5rem; }

    /* FOOTER */
    footer {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem; color: var(--muted);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span>🤌</span>
      <span>Hand<span class="logo-em">2</span>Emoji</span>
    </div>
    <div class="api-pill loading" id="apiBadge">
      <div class="dot"></div>
      <span id="apiText">Conectando...</span>
    </div>
  </header>

  <!-- CENTRO -->
  <div class="center">

    <!-- VIDEO -->
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="vg-top"></div>
      <div class="vg-bot"></div>

      <div class="vbadge tl" id="fpsBadge">-- fps</div>
      <div class="vbadge tr" id="handBadge">Sin mano</div>

      <div class="video-emoji">
        <span class="glyph" id="glyph">🤚</span>
        <div class="name"  id="glyphName">muestra tu mano</div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progFill"></div>
      </div>

      <div class="start-overlay" id="startOvl">
        <div class="float">🖐️</div>
        <p>Activa la cámara para comenzar</p>
        <button class="btn btn-primary" id="btnOvl" style="width:auto;padding:.7rem 2rem">▶ Iniciar</button>
      </div>
    </div>

    <!-- PANEL -->
    <div class="panel">

      <!-- Gesto actual -->
      <div class="card">
        <div class="card-title">Detectado</div>
        <div class="curr">
          <div class="curr-box" id="currBox">❓</div>
          <div class="curr-name empty" id="currName">Sin detección</div>
        </div>
      </div>

      <!-- Gestos -->
      <div class="card" style="flex:1;overflow-y:auto">
        <div class="card-title">Gestos</div>
        <div class="chips" id="chipsGrid"></div>
      </div>

      <!-- Controles -->
      <div class="card">
        <div class="btns">
          <button class="btn btn-primary" id="btnStart" disabled>▶ Iniciar cámara</button>
          <button class="btn btn-danger"  id="btnStop"  disabled>■ Detener</button>
        </div>
      </div>

    </div>
  </div>

  <footer>Hand2Emoji · Detección de gestos en tiempo real</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
// ── CONFIG ──
const API_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://hand2emoji.onrender.com';
const HOLD_MS    = 900;   // ms que debe mantenerse el gesto
const COOL_MS    = 1000;  // ms de pausa tras confirmar
const THROTTLE   = 180;   // ms entre llamadas a la API

// ── ESTADO ──
let state     = 'listening'; // 'listening' | 'holding' | 'cooldown'
let candidate = null;
let holdStart = null;
let lastCall  = 0;
let prevGesto = null;
let frames = 0, fpsT = Date.now(), fps = 0;
let mpCam = null;

// ── DOM ──
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const glyph    = document.getElementById('glyph');
const glyphName= document.getElementById('glyphName');
const progFill = document.getElementById('progFill');
const fpsBadge = document.getElementById('fpsBadge');
const handBadge= document.getElementById('handBadge');
const currBox  = document.getElementById('currBox');
const currName = document.getElementById('currName');
const chipsGrid= document.getElementById('chipsGrid');
const btnStart = document.getElementById('btnStart');
const btnStop  = document.getElementById('btnStop');
const btnOvl   = document.getElementById('btnOvl');
const startOvl = document.getElementById('startOvl');
const apiBadge = document.getElementById('apiBadge');
const apiText  = document.getElementById('apiText');

// ── API ──
async function checkAPI() {
  try {
    const r = await fetch(`${API_URL}/health`, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) throw new Error();
    apiBadge.className  = 'api-pill online';
    apiText.textContent = 'API online';
    await loadGestos();
    btnStart.disabled = false;
  } catch {
    apiBadge.className  = 'api-pill offline';
    apiText.textContent = 'API offline';
    btnStart.disabled   = true;
  }
}

async function loadGestos() {
  const r = await fetch(`${API_URL}/gestos`);
  const d = await r.json();
  chipsGrid.innerHTML = '';
  d.gestos.forEach(g => {
    const el = document.createElement('div');
    el.className = 'chip'; el.id = `chip-${g.nombre}`;
    el.innerHTML = `<span class="chip-em">${g.emoji}</span><span class="chip-nm">${g.nombre.replace(/_/g,' ')}</span>`;
    chipsGrid.appendChild(el);
  });
}

// ── NORMALIZACIÓN ──
// BUG FIX: usar coordenadas en píxeles igual que Python
// MediaPipe JS da valores 0-1, multiplicamos por dimensiones reales
function normalize(lms, W, H) {
  const m  = { x: lms[0].x * W, y: lms[0].y * H, z: lms[0].z };
  const r9 = { x: lms[9].x * W, y: lms[9].y * H, z: lms[9].z };
  const dx = r9.x - m.x, dy = r9.y - m.y, dz = r9.z - m.z;
  const s  = Math.sqrt(dx*dx + dy*dy + dz*dz) + 1e-6;

  const xs=[], ys=[], zs=[];
  for (const p of lms) {
    const px = p.x * W, py = p.y * H, pz = p.z;
    xs.push((px - m.x) / s);
    ys.push((py - m.y) / s);
    zs.push((pz - m.z) / s);
  }
  return [...xs, ...ys, ...zs];
}

// ── PREDICCIÓN ──
async function predict(lms, lado, W, H) {
  try {
    const r = await fetch(`${API_URL}/predict`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ landmarks: normalize(lms, W, H), lado }),
      signal: AbortSignal.timeout(2000)
    });
    return await r.json();
  } catch { return null; }
}

// ── CONFIRMAR GESTO ──
function confirmar(res) {
  const { gesto, emoji } = res;

  // Pop si cambió
  if (gesto !== prevGesto) {
    glyph.classList.remove('pop');
    void glyph.offsetWidth;
    glyph.classList.add('pop');
    prevGesto = gesto;
  }

  // Video
  glyph.textContent    = emoji;
  glyphName.textContent = gesto.replace(/_/g, ' ');

  // Panel
  currBox.textContent  = emoji;
  currBox.className    = 'curr-box active';
  currName.textContent = gesto.replace(/_/g, ' ');
  currName.className   = 'curr-name';

  // Chip
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById(`chip-${gesto}`)?.classList.add('active');

  // Cooldown
  state = 'cooldown'; candidate = null; holdStart = null;
  animarBarra(COOL_MS, 'var(--amber)');
  setTimeout(() => {
    state = 'listening'; candidate = null;
    progFill.style.width = '0%';
  }, COOL_MS);
}

function animarBarra(duracion, color) {
  const t0 = performance.now();
  progFill.style.background = color;
  function frame() {
    const pct = Math.min(((performance.now() - t0) / duracion) * 100, 100);
    progFill.style.width = `${pct}%`;
    if (pct < 100) requestAnimationFrame(frame);
    else progFill.style.width = '0%';
  }
  requestAnimationFrame(frame);
}

function resetVideo() {
  glyph.textContent     = '🤚';
  glyphName.textContent = 'muestra tu mano';
  progFill.style.width  = '0%';
  currBox.textContent   = '❓';
  currBox.className     = 'curr-box';
  currName.textContent  = 'Sin detección';
  currName.className    = 'curr-name empty';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  prevGesto = null;
}

// ── MEDIAPIPE ──
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.75,
  minTrackingConfidence:  0.6,
});

hands.onResults(async (results) => {
  const W = video.videoWidth  || 640;
  const H = video.videoHeight || 480;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  // FPS
  frames++;
  const now = Date.now();
  if (now - fpsT >= 1000) {
    fps = frames; frames = 0; fpsT = now;
    fpsBadge.textContent = `${fps} fps`;
  }

  if (!results.multiHandLandmarks?.length) {
    handBadge.textContent = 'Sin mano';
    if (state !== 'cooldown') { candidate = null; holdStart = null; state = 'listening'; }
    return;
  }

  const lms = results.multiHandLandmarks[0];
  handBadge.textContent = '✋ Mano detectada';

  // Dibujar landmarks
  drawConnectors(ctx, lms, HAND_CONNECTIONS, { color: 'rgba(167,139,250,.5)', lineWidth: 2 });
  drawLandmarks(ctx, lms, { color: 'rgba(52,211,153,.85)', lineWidth: 1, radius: 3 });

  if (state === 'cooldown') return;
  if (now - lastCall < THROTTLE) return;
  lastCall = now;

  // BUG FIX: invertir el lado porque el video está espejado
  // MediaPipe JS con video espejado reporta Left/Right al revés vs Python
  const ladoRaw = results.multiHandedness[0].label;
  const lado    = ladoRaw === 'Right' ? 'Left' : 'Right';

  const res = await predict(lms, lado, W, H);
  if (!res || !res.detectado) {
    candidate = null; holdStart = null;
    return;
  }

  const gesto = res.gesto;

  if (state === 'listening') {
    candidate = gesto; holdStart = now; state = 'holding';

  } else if (state === 'holding') {
    if (gesto !== candidate) {
      // Gesto cambió — reiniciar
      candidate = gesto; holdStart = now;
      progFill.style.width = '0%';
    } else {
      // Mismo gesto — llenar barra
      const elapsed = now - holdStart;
      progFill.style.width      = `${Math.min((elapsed / HOLD_MS) * 100, 100)}%`;
      progFill.style.background = 'var(--accent)';
      if (elapsed >= HOLD_MS) confirmar(res);
    }
  }
});

// ── CÁMARA ──
async function startCam() {
  btnStart.disabled = true; btnStart.textContent = '⏳ Iniciando...';
  startOvl.style.display = 'none';
  try {
    mpCam = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 640, height: 480
    });
    await mpCam.start();
    btnStart.textContent = '✓ Cámara activa';
    btnStop.disabled     = false;
  } catch(e) {
    startOvl.style.display = 'flex';
    btnStart.disabled      = false;
    btnStart.textContent   = '▶ Iniciar cámara';
    alert('No se pudo acceder a la cámara.');
  }
}

function stopCam() {
  if (mpCam) { mpCam.stop(); mpCam = null; }
  btnStart.disabled    = false; btnStart.textContent = '▶ Iniciar cámara';
  btnStop.disabled     = true;
  startOvl.style.display = 'flex';
  state = 'listening'; candidate = null; holdStart = null;
  resetVideo();
}

btnStart.addEventListener('click', startCam);
btnStop.addEventListener('click',  stopCam);
btnOvl.addEventListener('click',   startCam);

checkAPI();
setInterval(checkAPI, 15000);

// ── INIT ──
checkAPI();
setInterval(checkAPI, 15000);

// Mantener API despierta
setInterval(() => {
  fetch(`${API_URL}/health`).catch(() => {});
}, 14 * 60 * 1000);


</script>
</body>
</html>
